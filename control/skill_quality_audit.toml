audit_version = 2
owner = "research_x"
purpose = "Compact Skill boundary audit. This file records overlap decisions only; manifest, source locks, and foundation registry remain canonical."
created_at = "2026-06-25"

[policy]
skills_are_audit_targets_not_instructions = true
audit_is_not_registry = true
auto_rewrite_allowed = false
provider_or_external_action_allowed = false
repo_skills_must_be_manifested = true
codex_foundation_details_are_external = true
retired_project_skills_must_stay_out_of_research_x_agents = true

[canonical_sources]
repo_skill_manifest = ".codex/skill_manifest.lock"
research_x_adoption_registry = "control/adoption_registry.toml"
research_x_vendor_sources = "control/vendor_sources.lock.md"
codex_foundation_registry = "C:/Users/maasa/.codex/foundation/codex-foundation-registry.toml"
codex_foundation_vendor_sources = "C:/Users/maasa/.codex/foundation/vendor_sources.lock.md"
retired_project_skill_archive = "C:/Users/maasa/.codex/foundation/project_skills/research_x_retired_codex_ops"

[[repo_skill_groups]]
name = "decision_and_planning"
members = ["research-x-decision-loop", "research-x-implementation-plan-flow"]
decision = "Keep separate. decision-loop owns decision sufficiency; implementation-plan-flow owns candidate-to-execution gating after a candidate set exists."
preserve = "No provider/API/install/connector/MCP/hook action and no automatic Skill edit from plans or decisions."

[[repo_skill_groups]]
name = "runtime_pipeline"
members = ["research-x-memory-workflow", "research-x-observability-review", "research-x-provider-gate"]
decision = "Keep separate. memory-workflow owns evidence semantics; observability-review exposes stored state; provider-gate owns quota/API permission."
preserve = "raw source, searchable document, source bundle, context chunk, citation, and answer stay distinct; provider skips remain visible."

[[repo_skill_groups]]
name = "governance_and_intake"
members = ["research-x-doc-governance", "research-x-prompt-contract", "research-x-research-intake"]
decision = "Keep separate. doc-governance owns Markdown placement; prompt-contract owns prompt/tool contracts; research-intake owns source candidate classification."
preserve = "Generated summaries, search hits, diagrams, and consultation captures stay candidates or control artifacts until source restoration."

[[codex_foundation_watchlist]]
name = "context_and_session"
members = ["context-budget", "context-handoff-export", "planning-files", "codex-fluent", "basic-memory-cli"]
decision = "Owned by maasa/.codex. research_x may pass source pointers or bridge signals only; it must not relist or govern these Skills here."

[[codex_foundation_watchlist]]
name = "self_improvement"
members = ["codex-retrospective", "skillopt-sleep", "codex-strict-engineering"]
decision = "Owned by maasa/.codex. Self-improvement remains proposal-only with replay, qualifier, and human accept/reject."

[[codex_foundation_watchlist]]
name = "visual_output_helpers"
members = ["research-x-publishing-illustration", "ian-xiaohei-illustrations"]
decision = "Owned by maasa/.codex. publishing-illustration is the source-aware parent; ian-xiaohei is an explicit style adapter. Neither creates evidence."

