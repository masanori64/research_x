name: Research X Build Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: research-x-build-artifacts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Research X Build Artifacts / build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@v8

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install locked dependencies
        run: uv sync --locked --group dev

      - name: Build package artifacts
        run: uv build

      - name: Verify build outputs
        shell: bash
        run: |
          uv run python - <<'PY'
          from pathlib import Path

          dist = Path("dist")
          wheels = list(dist.glob("research_x-*.whl"))
          sdists = list(dist.glob("research_x-*.tar.gz"))
          if not wheels or not sdists:
              raise SystemExit("expected both wheel and source distribution")
          PY

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: research-x-dist-${{ github.ref_name }}
          path: dist/
          if-no-files-found: error
          retention-days: 30
