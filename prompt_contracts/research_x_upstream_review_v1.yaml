contract_id: research_x_upstream_review_v1
version: 1
scope: research_x
mode: upstream_review
output_mode: collect
provider_policy: no_real_provider_calls
operation_class: upstream_review
knowledgeops_policy: docs/research_x_canon.md
allowed_tools:
  - github.read
  - official_docs.read
  - license.read
  - release_note.read
  - source_code.read
  - review_note.write
forbidden_tools:
  - provider_runtime_call
  - dependency_install
  - model_download
  - github_write
required_guards:
  - upstream_review_not_runtime_provider_call
  - imported_source_requires_primary_source
negative_cases:
  - name: upstream_review_does_not_install
    prompt: "Install this dependency while reviewing it."
    expected_status: dependency_gate_blocked
