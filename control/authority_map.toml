schema_version = 1
artifact_kind = "research_x_authority_map"
project_id = "research_x"
control_artifact = true
not_evidence = true
expected_classifications = [
  "canon",
  "current_state",
  "control",
  "evidence",
  "history",
  "generated",
]

[classifications.canon]
authority = "architecture_and_policy"
evidence_status = "not_evidence"
current_architecture_authority = true
current_state_authority = false
archive_only = false

[classifications.current_state]
authority = "current_project_state"
evidence_status = "not_evidence"
current_architecture_authority = false
current_state_authority = true
archive_only = false

[classifications.control]
authority = "execution_input_or_guard"
evidence_status = "not_evidence"
current_architecture_authority = false
current_state_authority = false
archive_only = false

[classifications.evidence]
authority = "runtime_source_or_validated_evidence"
evidence_status = "conditional_runtime_evidence"
current_architecture_authority = false
current_state_authority = false
archive_only = false
answer_support_policy = "requires_role_source_citation_and_database_validation"

[classifications.history]
authority = "archive_only"
evidence_status = "not_evidence"
current_architecture_authority = false
current_state_authority = false
archive_only = true

[classifications.generated]
authority = "derived_only"
evidence_status = "not_evidence"
current_architecture_authority = false
current_state_authority = false
archive_only = false

