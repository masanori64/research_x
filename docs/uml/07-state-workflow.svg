<text x="74" y="82" font-size="44" font-weight="800" text-anchor="start" fill="#1f4e79"><tspan x="74" dy="0">UML状態機械図：メモリ実行履歴の停止理由</tspan></text><text x="78" y="122" font-size="20" font-weight="600" text-anchor="start" fill="#50606f"><tspan x="78" dy="0">正しそうな文章より、状態と停止理由を先に見る</tspan></text>
<circle cx="120" cy="235" r="22" fill="#234e8f"/><rect x="220" y="190" width="270" height="90" rx="18" fill="#edf4fb" stroke="#234e8f" stroke-width="2"/><text x="355" y="229.65" font-size="19" font-weight="700" text-anchor="middle" fill="#1f2933"><tspan x="355" dy="0">計画中</tspan><tspan x="355" dy="24">クエリ計画・経路</tspan></text><rect x="590" y="190" width="290" height="90" rx="18" fill="#edf4fb" stroke="#234e8f" stroke-width="2"/><text x="735" y="229.65" font-size="19" font-weight="700" text-anchor="middle" fill="#1f2933"><tspan x="735" dy="0">ローカル文脈</tspan><tspan x="735" dy="24">検索とソース復元</tspan></text><rect x="985" y="190" width="300" height="90" rx="18" fill="#edf4fb" stroke="#234e8f" stroke-width="2"/><text x="1135" y="229.65" font-size="19" font-weight="700" text-anchor="middle" fill="#1f2933"><tspan x="1135" dy="0">引用確認</tspan><tspan x="1135" dy="24">文脈チャンクを確認</tspan></text><rect x="1370" y="190" width="300" height="90" rx="18" fill="#edf7ed" stroke="#234e8f" stroke-width="2"/><text x="1520" y="229.65" font-size="19" font-weight="700" text-anchor="middle" fill="#1f2933"><tspan x="1520" dy="0">回答可能</tspan><tspan x="1520" dy="24">引用付き回答</tspan></text><rect x="590" y="430" width="290" height="90" rx="18" fill="#fff8df" stroke="#234e8f" stroke-width="2"/><text x="735" y="469.65" font-size="19" font-weight="700" text-anchor="middle" fill="#1f2933"><tspan x="735" dy="0">レビュー待ち</tspan><tspan x="735" dy="24">不足・矛盾・曖昧</tspan></text><rect x="985" y="430" width="300" height="90" rx="18" fill="#fff0f0" stroke="#c62828" stroke-width="2"/><text x="1135" y="469.65" font-size="19" font-weight="700" text-anchor="middle" fill="#1f2933"><tspan x="1135" dy="0">外部保留</tspan><tspan x="1135" dy="24">外部文脈・API待ち</tspan></text><rect x="1370" y="430" width="300" height="90" rx="18" fill="#fff0f0" stroke="#c62828" stroke-width="2"/><text x="1520" y="469.65" font-size="19" font-weight="700" text-anchor="middle" fill="#1f2933"><tspan x="1520" dy="0">停止・エラー</tspan><tspan x="1520" dy="24">予算・外部API・実行失敗</tspan></text><rect x="220" y="670" width="270" height="90" rx="18" fill="#fff8df" stroke="#234e8f" stroke-width="2"/><text x="355" y="709.65" font-size="19" font-weight="700" text-anchor="middle" fill="#1f2933"><tspan x="355" dy="0">回答保留</tspan><tspan x="355" dy="24">根拠不足を返す</tspan></text><rect x="590" y="670" width="290" height="90" rx="18" fill="#e8f7f6" stroke="#234e8f" stroke-width="2"/><text x="735" y="709.65" font-size="19" font-weight="700" text-anchor="middle" fill="#1f2933"><tspan x="735" dy="0">監査履歴</tspan><tspan x="735" dy="24">手順を保存</tspan></text><circle cx="1515" cy="780" r="25" fill="#ffffff" stroke="#234e8f" stroke-width="3"/><circle cx="1515" cy="780" r="13" fill="#234e8f"/><line x1="142" y1="235" x2="220" y2="235" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="490" y1="235" x2="590" y2="235" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><text x="540" y="225" font-size="17" font-weight="700" text-anchor="middle" fill="#234e8f"><tspan x="540" dy="0">経路決定</tspan></text><line x1="880" y1="235" x2="985" y2="235" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><text x="932.5" y="225" font-size="17" font-weight="700" text-anchor="middle" fill="#234e8f"><tspan x="932.5" dy="0">ソース復元</tspan></text><line x1="1285" y1="235" x2="1370" y2="235" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><text x="1327.5" y="225" font-size="17" font-weight="700" text-anchor="middle" fill="#234e8f"><tspan x="1327.5" dy="0">引用確認済み</tspan></text><line x1="1135" y1="280" x2="1135" y2="430" stroke="#c62828" stroke-width="2.4" stroke-dasharray="10 8" marker-end="url(#arrow)"/><text x="1135" y="345" font-size="17" font-weight="700" text-anchor="middle" fill="#c62828"><tspan x="1135" dy="0">外部が必要</tspan></text><line x1="1285" y1="475" x2="1370" y2="475" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><text x="1327.5" y="465" font-size="17" font-weight="700" text-anchor="middle" fill="#234e8f"><tspan x="1327.5" dy="0">呼出失敗・予算</tspan></text><line x1="985" y1="475" x2="880" y2="475" stroke="#c62828" stroke-width="2.4" stroke-dasharray="10 8" marker-end="url(#arrow)"/><text x="932.5" y="465" font-size="17" font-weight="700" text-anchor="middle" fill="#c62828"><tspan x="932.5" dy="0">承認なし</tspan></text><line x1="735" y1="280" x2="735" y2="430" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><text x="735" y="345" font-size="17" font-weight="700" text-anchor="middle" fill="#234e8f"><tspan x="735" dy="0">ソース不足</tspan></text><line x1="590" y1="475" x2="490" y2="715" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><text x="540" y="585" font-size="17" font-weight="700" text-anchor="middle" fill="#234e8f"><tspan x="540" dy="0">回答不可</tspan></text><line x1="735" y1="520" x2="735" y2="670" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><text x="735" y="585" font-size="17" font-weight="700" text-anchor="middle" fill="#234e8f"><tspan x="735" dy="0">履歴保存</tspan></text><line x1="1520" y1="280" x2="1520" y2="755" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="880" y1="715" x2="1490" y2="780" stroke="#234e8f" stroke-width="2.4" stroke-dasharray="10 8" marker-end="url(#arrow)"/><text x="1185" y="737.5" font-size="17" font-weight="700" text-anchor="middle" fill="#234e8f"><tspan x="1185" dy="0">完了状態も履歴で確認</tspan></text><rect x="985" y="820" width="500" height="96" rx="4" fill="#fff8df" stroke="#b08900" stroke-width="2"/><text x="1235" y="852.95" font-size="17" font-weight="650" text-anchor="middle" fill="#1f2933"><tspan x="1235" dy="0">主な停止理由:</tspan><tspan x="1235" dy="21">十分な根拠 / ローカル根拠なし / 外部文脈待ち</tspan><tspan x="1235" dy="21">レビュー待ち / 予算超過 / 外部API失敗</tspan></text>
