[meta]
schema_version = 1
owner = "research_x"
canon = "docs/research_x_canon.md"
purpose = "Map tests to numbered canon sections. This is not policy."

[[suites]]
id = "canon.markdown"
path = "tests/canon/test_markdown_canon.py"
canon_items = ["P0", "P18"]
protects = [
  "durable Markdown is limited to README.md, AGENTS.md, docs/research_x_canon.md",
  "retired Markdown paths do not return",
  "old route phrases do not reappear",
]

[[suites]]
id = "canon.prompt_contracts"
path = "tests/canon/test_prompt_contracts.py"
canon_items = ["P15"]
protects = [
  "mode-specific prompt contracts exist",
  "legacy v1 contract is deprecated",
  "answer contract requires evidence package, citation, claim support, db validation",
]

[[suites]]
id = "schema.migration"
path = "tests/memory/test_schema_migration.py"
canon_items = ["P2", "L1", "L2"]
protects = [
  "ensure_memory_schema is idempotent",
  "KnowledgeOps tables exist",
  "migration does not delete rows",
  "migration lock regression is guarded by isolated DB fixture",
]

