<text x="74" y="82" font-size="44" font-weight="800" text-anchor="start" fill="#1f4e79"><tspan x="74" dy="0">UMLパッケージ図：コード配置と依存の読み順</tspan></text><text x="78" y="122" font-size="20" font-weight="600" text-anchor="start" fill="#50606f"><tspan x="78" dy="0">実装面の入口・取得・保存・記憶検索・確認成果物を分けて見る</tspan></text>
<path d="M90 214 L90 360 L420 360 L420 214 L248.4 214 L224.4 180 L90 180 Z" fill="#fbfdff" stroke="#234e8f" stroke-width="2"/><text x="108" y="205" font-size="18" font-weight="800" text-anchor="start" fill="#1f2933"><tspan x="108" dy="0">コマンド入口</tspan></text><text x="112" y="254" font-size="18" font-weight="600" text-anchor="start" fill="#1f2933"><tspan x="112" dy="0">起動窓口</tspan></text><text x="112" y="284" font-size="18" font-weight="600" text-anchor="start" fill="#1f2933"><tspan x="112" dy="0">引数と安全ゲート</tspan></text><text x="112" y="314" font-size="18" font-weight="600" text-anchor="start" fill="#1f2933"><tspan x="112" dy="0">uv実行前提</tspan></text><path d="M525 184 L525 350 L885 350 L885 184 L697.8 184 L673.8 150 L525 150 Z" fill="#fbfdff" stroke="#234e8f" stroke-width="2"/><text x="543" y="175" font-size="18" font-weight="800" text-anchor="start" fill="#1f2933"><tspan x="543" dy="0">認証・セッション</tspan></text><text x="547" y="224" font-size="18" font-weight="600" text-anchor="start" fill="#1f2933"><tspan x="547" dy="0">account別path</tspan></text><text x="547" y="254" font-size="18" font-weight="600" text-anchor="start" fill="#1f2933"><tspan x="547" dy="0">セッション変換</tspan></text><text x="547" y="284" font-size="18" font-weight="600" text-anchor="start" fill="#1f2933"><tspan x="547" dy="0">.secretsは非公開</tspan></text><path d="M1010 184 L1010 370 L1370 370 L1370 184 L1182.8 184 L1158.8 150 L1010 150 Z" fill="#fbfdff" stroke="#234e8f" stroke-width="2"/><text x="1028" y="175" font-size="18" font-weight="800" text-anchor="start" fill="#1f2933"><tspan x="1028" dy="0">取得部品</tspan></text><text x="1032" y="224" font-size="18" font-weight="600" text-anchor="start" fill="#1f2933"><tspan x="1032" dy="0">部品カタログ</tspan></text><text x="1032" y="254" font-size="18" font-weight="600" text-anchor="start" fill="#1f2933"><tspan x="1032" dy="0">X取得ライブラリ</tspan></text><text x="1032" y="284" font-size="18" font-weight="600" text-anchor="start" fill="#1f2933"><tspan x="1032" dy="0">ブラウザ代替</tspan></text><text x="1032" y="314" font-size="18" font-weight="600" text-anchor="start" fill="#1f2933"><tspan x="1032" dy="0">失敗分類</tspan></text><path d="M525 479 L525 635 L885 635 L885 479 L697.8 479 L673.8 445 L525 445 Z" fill="#fbfdff" stroke="#234e8f" stroke-width="2"/><text x="543" y="470" font-size="18" font-weight="800" text-anchor="start" fill="#1f2933"><tspan x="543" dy="0">取得処理</tspan></text><text x="547" y="519" font-size="18" font-weight="600" text-anchor="start" fill="#1f2933"><tspan x="547" dy="0">取得部品の順序</tspan></text><text x="547" y="549" font-size="18" font-weight="600" text-anchor="start" fill="#1f2933"><tspan x="547" dy="0">証拠JSON</tspan></text><text x="547" y="579" font-size="18" font-weight="600" text-anchor="start" fill="#1f2933"><tspan x="547" dy="0">対象ごとの結果</tspan></text><path d="M1010 479 L1010 635 L1370 635 L1370 479 L1182.8 479 L1158.8 445 L1010 445 Z" fill="#fbfdff" stroke="#234e8f" stroke-width="2"/><text x="1028" y="470" font-size="18" font-weight="800" text-anchor="start" fill="#1f2933"><tspan x="1028" dy="0">共有保存</tspan></text><text x="1032" y="519" font-size="18" font-weight="600" text-anchor="start" fill="#1f2933"><tspan x="1032" dy="0">投稿</tspan></text><text x="1032" y="549" font-size="18" font-weight="600" text-anchor="start" fill="#1f2933"><tspan x="1032" dy="0">ブックマーク</tspan></text><text x="1032" y="579" font-size="18" font-weight="600" text-anchor="start" fill="#1f2933"><tspan x="1032" dy="0">引用関係・メディア</tspan></text><path d="M525 779 L525 970 L925 970 L925 779 L715 779 L691 745 L525 745 Z" fill="#fbfdff" stroke="#234e8f" stroke-width="2"/><text x="543" y="770" font-size="18" font-weight="800" text-anchor="start" fill="#1f2933"><tspan x="543" dy="0">記憶検索</tspan></text><text x="547" y="819" font-size="18" font-weight="600" text-anchor="start" fill="#1f2933"><tspan x="547" dy="0">表定義・コーパス</tspan></text><text x="547" y="849" font-size="18" font-weight="600" text-anchor="start" fill="#1f2933"><tspan x="547" dy="0">検索・文脈</tspan></text><text x="547" y="879" font-size="18" font-weight="600" text-anchor="start" fill="#1f2933"><tspan x="547" dy="0">回答・実行履歴</tspan></text><text x="547" y="909" font-size="18" font-weight="600" text-anchor="start" fill="#1f2933"><tspan x="547" dy="0">予算・評価・監査</tspan></text><path d="M1010 794 L1010 950 L1370 950 L1370 794 L1182.8 794 L1158.8 760 L1010 760 Z" fill="#fbfdff" stroke="#234e8f" stroke-width="2"/><text x="1028" y="785" font-size="18" font-weight="800" text-anchor="start" fill="#1f2933"><tspan x="1028" dy="0">発表・確認成果物</tspan></text><text x="1032" y="834" font-size="18" font-weight="600" text-anchor="start" fill="#1f2933"><tspan x="1032" dy="0">図・スライド確認</tspan></text><text x="1032" y="864" font-size="18" font-weight="600" text-anchor="start" fill="#1f2933"><tspan x="1032" dy="0">目録・検証</tspan></text><text x="1032" y="894" font-size="18" font-weight="600" text-anchor="start" fill="#1f2933"><tspan x="1032" dy="0">証拠ではない</tspan></text><path d="M90 794 L90 950 L420 950 L420 794 L248.4 794 L224.4 760 L90 760 Z" fill="#fbfdff" stroke="#234e8f" stroke-width="2"/><text x="108" y="785" font-size="18" font-weight="800" text-anchor="start" fill="#1f2933"><tspan x="108" dy="0">テスト</tspan></text><text x="112" y="834" font-size="18" font-weight="600" text-anchor="start" fill="#1f2933"><tspan x="112" dy="0">境界テスト</tspan></text><text x="112" y="864" font-size="18" font-weight="600" text-anchor="start" fill="#1f2933"><tspan x="112" dy="0">UML資産</tspan></text><text x="112" y="894" font-size="18" font-weight="600" text-anchor="start" fill="#1f2933"><tspan x="112" dy="0">外部利用停止</tspan></text><line x1="420" y1="245" x2="525" y2="245" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="885" y1="260" x2="1010" y2="260" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="705" y1="350" x2="705" y2="445" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="885" y1="540" x2="1010" y2="540" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="705" y1="635" x2="705" y2="745" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="925" y1="855" x2="1010" y2="855" stroke="#234e8f" stroke-width="2.4" stroke-dasharray="10 8" marker-end="url(#arrow)"/><text x="967.5" y="845" font-size="17" font-weight="700" text-anchor="middle" fill="#234e8f"><tspan x="967.5" dy="0">確認成果物</tspan></text><line x1="420" y1="855" x2="525" y2="855" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><text x="472.5" y="845" font-size="17" font-weight="700" text-anchor="middle" fill="#234e8f"><tspan x="472.5" dy="0">検証</tspan></text><path d="M255 760 C260 610 390 520 525 520" fill="none" stroke="#234e8f" stroke-width="2.4" stroke-dasharray="10 8" marker-end="url(#arrow)"/><text x="355" y="610" font-size="17" font-weight="700" text-anchor="middle" fill="#234e8f"><tspan x="355" dy="0">取得処理テスト</tspan></text><rect x="1420" y="780" width="280" height="140" rx="4" fill="#fff8df" stroke="#b08900" stroke-width="2"/><text x="1560" y="834.95" font-size="17" font-weight="650" text-anchor="middle" fill="#1f2933"><tspan x="1560" dy="0">図の正本はコードではなく、</tspan><tspan x="1560" dy="21">確認用生成物。</tspan><tspan x="1560" dy="21">設計境界は文書とテストで検証する。</tspan></text>
</svg>