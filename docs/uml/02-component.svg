="300" height="92" rx="6" fill="#e8f7f6" stroke="#234e8f" stroke-width="2"/><text x="970" y="529.3" font-size="18" font-weight="700" text-anchor="middle" fill="#1f2933"><tspan x="970" dy="0">&lt;&lt;部品&gt;&gt;</tspan><tspan x="970" dy="23">記憶コーパス構築</tspan><tspan x="970" dy="23">検索文書・関係</tspan></text><rect x="1260" y="500" width="310" height="92" rx="6" fill="#e8f7f6" stroke="#234e8f" stroke-width="2"/><text x="1415" y="529.3" font-size="18" font-weight="700" text-anchor="middle" fill="#1f2933"><tspan x="1415" dy="0">&lt;&lt;部品&gt;&gt;</tspan><tspan x="1415" dy="23">検索・文脈作成</tspan><tspan x="1415" dy="23">束・チャンク・引用</tspan></text><rect x="820" y="700" width="300" height="92" rx="6" fill="#edf4fb" stroke="#234e8f" stroke-width="2"/><text x="970" y="729.3" font-size="18" font-weight="700" text-anchor="middle" fill="#1f2933"><tspan x="970" dy="0">&lt;&lt;部品&gt;&gt;</tspan><tspan x="970" dy="23">実行履歴・回答</tspan><tspan x="970" dy="23">状態と停止理由</tspan></text><rect x="1260" y="700" width="310" height="92" rx="6" fill="#fff0f0" stroke="#c62828" stroke-width="2"/><text x="1415" y="729.3" font-size="18" font-weight="700" text-anchor="middle" fill="#1f2933"><tspan x="1415" dy="0">&lt;&lt;部品&gt;&gt;</tspan><tspan x="1415" dy="23">API予算ガード</tspan><tspan x="1415" dy="23">外部実行前に停止</tspan></text><rect x="430" y="760" width="285" height="92" rx="6" fill="#fff8df" stroke="#234e8f" stroke-width="2"/><text x="572.5" y="789.3" font-size="18" font-weight="700" text-anchor="middle" fill="#1f2933"><tspan x="572.5" dy="0">&lt;&lt;部品&gt;&gt;</tspan><tspan x="572.5" dy="23">確認成果物</tspan><tspan x="572.5" dy="23">WBS・図・目録</tspan></text><line x1="330" y1="235" x2="430" y2="205" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="330" y1="235" x2="430" y2="356" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="715" y1="356" x2="820" y2="286" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="1120" y1="286" x2="1260" y2="286" stroke="#c6282