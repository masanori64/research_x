# artifact_kind=github_workflow_wrapper
# control_artifact=true
# not_project_evidence=true
# not_research_evidence=true
# not_citation=true
# not_answer_support=true
# generated_by=codex-hotl-implementation-pipeline
# source_template=templates/github-workflows/codex-dashboard.template.yml
# foundation_manifest_sha256=38b3997ba64eaf3e219148140737b7741e2e09e3c5912545d7c3e39a82806a0d
name: Codex Dashboard Artifact

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codex-dashboard-artifact-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  upload-dashboard-artifact:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify dashboard artifact boundary
        shell: bash
        run: |
          test -f docs/control/codex/dashboard/index.html
          test -f docs/control/codex/dashboard/data/dashboard-state.json
          grep -q "control artifact / not evidence / not citation" docs/control/codex/dashboard/index.html

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-control-dashboard
          path: |
            docs/control/codex/dashboard/
            .codex-project/generated/
          if-no-files-found: error
          retention-days: 14
