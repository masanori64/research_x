name: Research X Dependency Review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: research-x-dependency-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Research X Dependency Review / high severity runtime gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          vulnerability-check: true
          license-check: true
          fail-on-scopes: runtime
          comment-summary-in-pr: never
