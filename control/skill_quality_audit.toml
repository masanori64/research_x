[[overlap_groups]]
name = "research_x_decision_and_planning"
judgment = "Keep separate: decision-loop decides whether and why; implementation-plan-flow converts accepted candidate sets into gated implementation lanes."
members = ["research-x-decision-loop", "research-x-implementation-plan-flow"]

[[overlap_groups]]
name = "research_x_runtime_pipeline"
judgment = "Keep separate: memory-workflow owns evidence pipeline invariants; observability-review exposes hidden runtime state; provider-gate blocks quota/API lanes."
members = ["research-x-memory-workflow", "research-x-observability-review", "research-x-provider-gate"]

[[overlap_groups]]
name = "research_x_governance"
judgment = "Keep separate: doc-governance owns Markdown placement; prompt-contract owns prompt/schema/tool boundary tests; research-intake owns source candidate classification."
members = ["research-x-doc-governance", "research-x-prompt-contract", "research-x-research-intake"]

[[overlap_groups]]
name = "codex_context_and_session"
judgment = "Keep separate: context-budget is compression/context pressure; context-handoff-export is portable handoff artifact; planning-files is active work state; codex-fluent is session hygiene."
members = ["basic-memory-cli", "context-budget", "context-handoff-export", "planning-files", "codex-fluent"]

[[overlap_groups]]
name = "codex_self_improvement"
judgment = "Keep separate under manual promotion: retrospective reviews history; skillopt-sleep stages offline replay/qualifier; strict-engineering is explicit optional process discipline."
members = ["codex-retrospective", "skillopt-sleep", "codex-strict-engineering"]

[[overlap_groups]]
name = "codex_source_and_prompt_governance"
judgment = "Keep separate: skill-security-review is source/tool trust; prompt-contract-testing is deterministic prompt contract testing."
members = ["chatgpt-control-router", "skill-security-review", "prompt-contract-testing"]

[[overlap_groups]]
name = "codex_visual_output_helpers"
judgment = "Overlap exists but not redundant: publishing-illustration is source-aware research_x visual brief; ian-xiaohei is explicit Xiaohei-style illustration planning. Keep both, but watch trigger ambiguity."
members = ["research-x-publishing-illustration", "ian-xiaohei-illustrations"]

[[overlap_groups]]
name = "retired_research_x_codex_ops"
judgment = "Keep archived only unless a future audit explicitly promotes an equivalent global owner."
members = [
  "research-x-context-budget",
  "research-x-goal-runner",
  "research-x-parallel-review",
  "research-x-skill-source-review",
  "research-x-skillization-intake",
]

