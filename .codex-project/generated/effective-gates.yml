schema_version: 1
gates:
  - gate_id: provider_api_quota
    status: requires_explicit_user_gate
    severity: blocking
    reason: Provider/API/quota use, including paid, free-tier, trial-credit, or zero-dollar quota.
    allowed_without_gate: false
  - gate_id: secrets_credentials
    status: requires_explicit_user_gate
    severity: blocking
    reason: Secrets, credentials, PATs, deploy keys, environment secrets, or account login.
    allowed_without_gate: false
  - gate_id: install_dependency_model_download
    status: requires_explicit_user_gate
    severity: blocking
    reason: New dependency install, native tool install, browser install, or model download.
    allowed_without_gate: false
  - gate_id: mcp_plugin_hook_enablement
    status: requires_explicit_user_gate
    severity: blocking
    reason: MCP, plugin, connector, or hook enablement/change.
    allowed_without_gate: false
  - gate_id: destructive_action
    status: requires_explicit_user_gate
    severity: blocking
    reason: Delete, purge, force-push, irreversible overwrite, or destructive data action.
    allowed_without_gate: false
  - gate_id: irreversible_db_migration
    status: requires_explicit_user_gate
    severity: blocking
    reason: DB migration or data mutation that cannot be rolled back automatically.
    allowed_without_gate: false
  - gate_id: production_external_side_effect
    status: requires_explicit_user_gate
    severity: blocking
    reason: Production action with external side effects beyond safe static deploy.
    allowed_without_gate: false
  - gate_id: github_pages_enablement
    status: requires_explicit_user_gate
    severity: blocking
    reason: GitHub Pages enablement or settings change.
    allowed_without_gate: false
  - gate_id: repository_settings_change
    status: requires_explicit_user_gate
    severity: blocking
    reason: Repository settings, branch protection, or environment protection change.
    allowed_without_gate: false
