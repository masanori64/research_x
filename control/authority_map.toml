[[conflicts]]
id = "pre_api_reports_vs_documented_provider_runs"
status = "resolved_by_current_state"
older_claim = "Pre-API reports state that no real provider call had occurred."
newer_record = "Limit-10 and limit-100 provider run reports document completed calls."
resolution = "Treat pre-API reports as history and use control/project_state.json for current state."

[[conflicts]]
id = "legacy_wbs_vs_documented_provider_runs"
status = "resolved_by_current_state"
older_claim = "The legacy WBS pauses before the first real provider canary."
newer_record = "Later reports document completed limit-10 and limit-100 runs."
resolution = "The legacy WBS is archive-only and cannot override current state."

[[conflicts]]
id = "provider_run_preceded_abcd_completion"
status = "mitigated_by_quarantine_not_erased"
older_event = "The limit-100 provider run occurred before the A-D input redesign completed."
newer_control = "Lineage-less pre-A-D rows were quarantined and marked legacy_without_projection_lineage."
resolution = "Do not use quarantined rows for promotion evidence; provider quality remains unfinished."

[[conflicts]]
id = "generated_latest_status_vs_later_runtime_history"
status = "resolved_by_current_state"
older_claim = "Generated review artifacts describe a pre-provider boundary."
newer_record = "Later run reports document provider execution and a semantic promotion hold."
resolution = "Generated artifacts are derived navigation aids, never current-state authority."

[[unknowns]]
id = "provider_runs_after_limit_100"
status = "unknown"
blocking_scope = "provider_usage_and_latest_runtime_state"
question = "Were any real provider requests executed after the documented limit-100 run?"

[[unknowns]]
id = "live_runtime_database_revalidation"
status = "unknown"
blocking_scope = "runtime_evidence_acceptance"
question = "Does the live ignored database still match the documented quarantine and lineage state?"

[[unknowns]]
id = "real_provider_model_quality"
status = "unknown"
blocking_scope = "semantic_promotion"
question = "Do labeled real-provider quality evaluations meet an approved promotion threshold?"

[[unknowns]]
id = "quarantined_rows_rebuilt"
status = "unknown"
blocking_scope = "legacy_row_reuse"
question = "Were quarantined lineage-less rows subsequently rebuilt under the A-D contract?"
