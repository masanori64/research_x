<rect width="100%" height="100%" fill="#ffffff"/>
<text x="74" y="82" font-size="44" font-weight="800" text-anchor="start" fill="#1f4e79"><tspan x="74" dy="0">UMLアクティビティ図：X取得から共有保存まで</tspan></text><text x="78" y="122" font-size="20" font-weight="600" text-anchor="start" fill="#50606f"><tspan x="78" dy="0">取得は生の証拠の入口。ラベルや要約で置き換えない</tspan></text>
<circle cx="125" cy="235" r="22" fill="#234e8f"/><rect x="220" y="190" width="285" height="90" rx="18" fill="#edf4fb" stroke="#234e8f" stroke-width="2"/><text x="362.5" y="229.65" font-size="19" font-weight="700" text-anchor="middle" fill="#1f2933"><tspan x="362.5" dy="0">取得対象を読む</tspan><tspan x="362.5" dy="24">プロフィール・検索・URL・保存済み</tspan></text><rect x="610" y="190" width="300" height="90" rx="18" fill="#edf4fb" stroke="#234e8f" stroke-width="2"/><text x="760" y="229.65" font-size="19" font-weight="700" text-anchor="middle" fill="#1f2933"><tspan x="760" dy="0">セッションを準備</tspan><tspan x="760" dy="24">アカウント別Cookie</tspan></text><rect x="1015" y="190" width="310" height="90" rx="18" fill="#edf4fb" stroke="#234e8f" stroke-width="2"/><text x="1170" y="229.65" font-size="19" font-weight="700" text-anchor="middle" fill="#1f2933"><tspan x="1170" dy="0">取得部品の順序を選ぶ</tspan><tspan x="1170" dy="24">対象種別ごとの順序</tspan></text><rect x="1015" y="365" width="310" height="90" rx="18" fill="#edf4fb" stroke="#234e8f" stroke-width="2"/><text x="1170" y="404.65" font-size="19" font-weight="700" text-anchor="middle" fill="#1f2933"><tspan x="1170" dy="0">取得部品を実行</tspan><tspan x="1170" dy="24">失敗を隔離</tspan></text><rect x="610" y="365" width="300" height="90" rx="18" fill="#edf4fb" stroke="#234e8f" stroke-width="2"/><text x="760" y="404.65" font-size="19" font-weight="700" text-anchor="middle" fill="#1f2933"><tspan x="760" dy="0">失敗分類</tspan><tspan x="760" dy="24">時間切れ・認証・構造変化等</tspan></text><rect x="220" y="365" width="285" height="90" rx="18" fill="#edf4fb" stroke="#234e8f" stroke-width="2"/><text x="362.5" y="404.65" font-size="19" font-weight="700" text-anchor="middle" fill="#1f2933"><tspan x="362.5" dy="0">取得項目を統合</tspan><tspan x="362.5" dy="24">重複と引用関係を整理</tspan></text><rect x="220" y="560" width="285" height="90" rx="18" fill="#edf4fb" stroke="#234e8f" stroke-width="2"/><text x="362.5" y="599.65" font-size="19" font-weight="700" text-anchor="middle" fill="#1f2933"><tspan x="362.5" dy="0">十分な件数?</tspan><tspan x="362.5" dy="24">カーソル終了も確認</tspan></text><rect x="610" y="560" width="300" height="90" rx="18" fill="#edf4fb" stroke="#234e8f" stroke-width="2"/><text x="760" y="599.65" font-size="19" font-weight="700" text-anchor="middle" fill="#1f2933"><tspan x="760" dy="0">共有保存へ記録</tspan><tspan x="760" dy="24">SQLiteとJSONL</tspan></text><rect x="1015" y="560" width="310" height="90" rx="18" fill="#edf4fb" stroke="#234e8f" stroke-width="2"/><text x="1170" y="599.65" font-size="19" font-weight="700" text-anchor="middle" fill="#1f2933"><tspan x="1170" dy="0">試行記録</tspan><tspan x="1170" dy="24">取得試行ごとに記録</tspan></text><rect x="610" y="755" width="300" height="90" rx="18" fill="#edf4fb" stroke="#234e8f" stroke-width="2"/><text x="760" y="794.65" font-size="19" font-weight="700" text-anchor="middle" fill="#1f2933"><tspan x="760" dy="0">記憶構築へ渡す</tspan><tspan x="760" dy="24">投影は再構築可能</tspan></text><circle cx="1375" cy="605" r="25" fill="#ffffff" stroke="#234e8f" stroke-width="3"/><circle cx="1375" cy="605" r="13" fill="#234e8f"/><line x1="147" y1="235" x2="220" y2="235" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="505" y1="235" x2="610" y2="235" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="910" y1="235" x2="1015" y2="235" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="1170" y1="280" x2="1170" y2="365" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="1015" y1="410" x2="910" y2="410" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="610" y1="410" x2="505" y2="410" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="362" y1="455" x2="362" y2="560" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="505" y1="605" x2="610" y2="605" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><text x="557.5" y="595" font-size="17" font-weight="700" text-anchor="middle" fill="#234e8f"><tspan x="557.5" dy="0">はい</tspan></text><line x1="910" y1="605" x2="1015" y2="605" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="1325" y1="605" x2="1350" y2="605" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><line x1="760" y1="650" x2="760" y2="755" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><path d="M362 560 C360 505 760 505 1015 410" fill="none" stroke="#234e8f" stroke-width="2.4" marker-end="url(#arrow)"/><text x="675" y="520" font-size="17" font-weight="700" text-anchor="middle" fill="#234e8f"><tspan x="675" dy="0">不足 / 次の取得部品</tspan></text><rect x="1180" y="760" width="430" height="92" rx="4" fill="#fff8df" stroke="#b08900" stroke-width="2"/><text x="1395" y="800.8" font-size="18" font-weight="650" text-anchor="middle" fill="#1f2933"><tspan x="1395" dy="0">分類・記録は確認用。</tspan><tspan x="1395" dy="23">投稿・メディア・関係の保存が後段の証拠復元の土台。</tspan></text>
