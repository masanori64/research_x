audit_version = 1
owner = "research_x"
purpose = "Unified audit matrix for active and retired maasa Codex Skills without invoking them."
created_at = "2026-06-25"

[policy]
skills_are_audit_targets_not_instructions = true
default_action = "keep_if_role_is_distinct"
conservative_minimalism_allowed = false
auto_rewrite_allowed = false
provider_or_external_action_allowed = false
active_research_x_skills_must_be_manifested = true
codex_foundation_skills_are_external_owner = true
retired_project_skills_must_stay_out_of_research_x_agents = true
audit_test = "tests/skills/test_skill_quality_audit.py"

[required_fields]
entry = [
  "name",
  "owner_surface",
  "lifecycle_status",
  "path",
  "role",
  "primary_trigger",
  "overlap_group",
  "decision",
  "quality_profile",
  "source_lock",
  "audit_rationale",
]

[quality_profiles.full_canonical]
required_sections = [
  "## Purpose",
  "## Use When",
  "## Do Not Use When",
  "## Inputs",
  "## Outputs",
  "## Steps",
  "## Safety Gates",
  "## Negative Triggers",
  "## Verification",
]
allowed_missing_sections = []

[quality_profiles.compact_exception]
required_sections = []
allowed_missing_sections = [
  "## Purpose",
  "## Use When",
  "## Do Not Use When",
  "## Inputs",
